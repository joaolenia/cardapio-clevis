<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clevi's - Disponível em Breve</title>
    
    <!-- Importando as fontes para manter o padrão Premium
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #121214;
        /* Fundo escuro com leve gradiente radial para dar profundidade */
        background-image: radial-gradient(circle at center, #1e1e24 0%, #121214 100%);
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 20px;
        animation: fadeIn 1s ease-out;
      }

      .brand {
        font-family: 'Montserrat', sans-serif;
        font-size: 3.5rem;
        font-weight: 900;
        letter-spacing: 4px;
        margin: 0;
        color: #fff;
        text-transform: uppercase;
        /* Efeito de brilho da marca */
        text-shadow: 0 0 15px rgba(255, 94, 0, 0.6), 0 0 30px rgba(255, 94, 0, 0.3);
      }

      .title {
        font-family: 'Montserrat', sans-serif;
        font-size: 2.2rem;
        font-weight: 700;
        color: #ff5e00; /* Laranja Clevi's */
        margin: 10px 0;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .subtitle {
        font-size: 1.1rem;
        color: #777e90;
        margin-top: 15px;
        max-width: 450px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.5;
      }

      /* Animação das bolinhas de loading */
      .loader {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .dot {
        width: 12px;
        height: 12px;
        background-color: #ff5e00;
        border-radius: 50%;
        animation: bounce 1.5s infinite ease-in-out both;
        box-shadow: 0 0 8px rgba(255, 94, 0, 0.5);
      }

      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      /* Keyframes para animações */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Responsividade para celular */
      @media (max-width: 600px) {
        .brand { font-size: 2.5rem; }
        .title { font-size: 1.6rem; }
        .subtitle { font-size: 0.95rem; padding: 0 10px; }
      }
    </style> -->
  </head>
